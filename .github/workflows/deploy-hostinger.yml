name: Deploy to Hostinger (Astro Static)

on:
  push:
    branches: ["main"]

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build Astro
        working-directory: site
        run: npm run build

      - name: Probe Hostinger deploy ports
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          python - <<'PY'
          import os
          import socket

          host = os.environ.get("FTP_SERVER", "").strip()
          if not host:
              print("[probe] FTP_SERVER secret is empty")
              raise SystemExit(1)

          for port in (21, 990, 65002):
              try:
                  with socket.create_connection((host, port), timeout=20):
                      print(f"[probe] port {port}: reachable")
              except Exception as exc:
                  print(f"[probe] port {port}: {exc.__class__.__name__}")
          PY

      - name: Deploy dist to Hostinger via FTP
        id: deploy_ftp
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          timeout: 300000
          local-dir: site/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          log-level: standard

      - name: Deploy dist to Hostinger via explicit FTPS fallback
        id: deploy_ftps
        if: steps.deploy_ftp.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          timeout: 300000
          local-dir: site/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          log-level: standard

      - name: Deploy dist to Hostinger via implicit FTPS fallback
        id: deploy_ftps_legacy
        if: steps.deploy_ftp.outcome == 'failure' && steps.deploy_ftps.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps-legacy
          port: 990
          security: loose
          timeout: 300000
          local-dir: site/dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          log-level: standard

      - name: Deploy dist to Hostinger via SFTP fallback
        id: deploy_sftp
        if: steps.deploy_ftp.outcome == 'failure' && steps.deploy_ftps.outcome == 'failure' && steps.deploy_ftps_legacy.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 65002
          source: "site/dist/*"
          target: ${{ secrets.FTP_SERVER_DIR }}
          strip_components: 2
          overwrite: true
          timeout: 60s
          command_timeout: 20m

      - name: Fail if every deploy mode failed
        if: steps.deploy_ftp.outcome == 'failure' && steps.deploy_ftps.outcome == 'failure' && steps.deploy_ftps_legacy.outcome == 'failure' && steps.deploy_sftp.outcome == 'failure'
        run: |
          echo "FTP, explicit FTPS, implicit FTPS, and SFTP all failed."
          echo "Verify FTP_SERVER uses the Hostinger FTP IP from hPanel, not the site domain."
          echo "If your Hostinger plan includes SSH access, confirm SFTP/SSH is enabled and reachable on port 65002."
          exit 1
